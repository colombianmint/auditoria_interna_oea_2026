<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auditoría Interna OEA 2026 | C.I. Colombian Mint</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mint: { 50:'#f0fdf6', 100:'#dcfce9', 200:'#bbf7d4', 300:'#86efad', 400:'#4ade80', 500:'#22c55e', 600:'#16a34a', 700:'#15803d', 800:'#166534', 900:'#14532d', 950:'#052e16' },
            gold: { 400:'#fbbf24', 500:'#f59e0b', 600:'#d97706' },
            navy: { 700:'#1e3a5f', 800:'#172e4a', 900:'#0f1f33', 950:'#0a1520' }
          },
          fontFamily: { sans:['Inter','system-ui','sans-serif'], display:['Playfair Display','serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-900 text-base leading-relaxed font-sans antialiased">

  <!-- Header -->
  <header class="bg-gradient-to-r from-navy-900 via-navy-800 to-mint-900 text-white shadow-xl sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16 lg:h-20">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 lg:w-12 lg:h-12 rounded-xl bg-white flex items-center justify-center shadow-lg overflow-hidden">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEigu_vafcG5saLG0r13cHA0Y9geRGVEjPESWbHTVt9fegBAIB6QsTVDelYSmoTSb69y912nYTf3ckJC6FeS1OcEyvDA_u3rJUlc3T02BzfssvNRrrLOESObIVaeI0SE3yW7GM4J2VqmB9zrDf6xsc3UyIESHks1sJ8OkxxgBxHinI48TTYsTLHSffvDWA/w200-h178/Logo-versi%C3%B3n-final-2022.png" alt="Logo corporativo" class="w-full h-full object-contain">
          </div>
          <div>
            <h1 class="font-display text-lg lg:text-2xl font-bold tracking-tight">Colombian Mint</h1>
            <p class="text-sm lg:text-base text-mint-200">Auditoría Interna OEA 2026</p>
          </div>
        </div>
        <div class="hidden md:flex items-center gap-2">
          <span class="badge-oea">OEA Exportador</span>
          <span class="badge-reval">Revalidado 2025</span>
        </div>
        <button id="menuToggle" class="lg:hidden p-2 rounded-lg hover:bg-white/10 transition" aria-label="Menú">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="flex min-h-[calc(100vh-4rem)]">
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar w-64 bg-white border-r border-slate-200 fixed lg:static inset-y-0 left-0 z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 pt-16 lg:pt-0">
      <div class="p-4 space-y-1">
        <button data-view="dashboard" class="nav-item active w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          <span class="font-medium">Dashboard</span>
        </button>
        <button data-view="plan" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          <span class="font-medium">Plan de Auditoría</span>
        </button>
        <button data-view="requisitos" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          <span class="font-medium">Requisitos OEA</span>
        </button>
        <button data-view="responsable" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          <span class="font-medium">Por Responsable</span>
        </button>
        <button data-view="capitulos" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
          <span class="font-medium">Por Capítulo</span>
        </button>
      </div>
      <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-slate-100">
        <p class="text-sm text-slate-700 text-center">Res. 000015/2016 · Art. 4º</p>
        <p class="text-sm text-slate-700 text-center mt-1">GMC-FR07 v2</p>
      </div>
    </nav>

    <!-- Overlay mobile -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/40 z-30 hidden lg:hidden"></div>

    <!-- Main Content -->
    <main class="flex-1 p-4 sm:p-6 lg:p-8 overflow-x-hidden">
      <div id="appContent"></div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 z-50 hidden">
    <div class="modal-backdrop absolute inset-0 bg-navy-900/60 backdrop-blur-sm" onclick="App.closeModal()"></div>
    <div class="modal-container absolute inset-4 sm:inset-auto sm:top-1/2 sm:left-1/2 sm:-translate-x-1/2 sm:-translate-y-1/2 sm:w-full sm:max-w-3xl sm:max-h-[90vh] bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col">
      <div id="modalHeader" class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-gradient-to-r from-mint-50 to-white"></div>
      <div id="modalBody" class="px-6 py-5 overflow-y-auto flex-1"></div>
      <div class="px-6 py-4 border-t border-slate-100 flex justify-end">
        <button onclick="App.closeModal()" class="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 rounded-xl font-medium transition">Cerrar</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 z-50 transform translate-y-20 opacity-0 transition-all duration-300">
    <div class="bg-navy-900 text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-3">
      <svg class="w-5 h-5 text-mint-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
      <span id="toastMsg"></span>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
